  name: CI

  on:
    push:
      branches:
        - sprint4/staging
        - sprint3/Staging
        - staging
        - main
    pull_request:
      branches:
        - sprint4/staging
        - sprint3/Staging
        - staging
        - main
    workflow_dispatch:

  jobs:
    test:
      runs-on: ubuntu-latest

      services:
        mysql:
          image: mysql:8.0
          env:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: ram_test
          ports:
            - 3306:3306
          options: >-
            --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=20

      env:
        DATABASE_URL: mysql://root:root@127.0.0.1:3306/ram_test

      steps:
        - name: Check out repository
          uses: actions/checkout@v4

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 24
            cache: npm

        - name: Install dependencies
          run: npm ci

        - name: Generate Prisma client
          run: npm run prisma:generate

        - name: Apply database schema
          run: npx prisma db push

        - name: Seed database
          run: npm run prisma:seed

        - name: Run tests
          run: npm test

        - name: Generate Jest report
          run: npm run test:report

        - name: Upload Jest report
          uses: actions/upload-artifact@v4
          with:
            name: jest-results
            path: reports/jest-results.json
